<div *ngIf="post; else notFound" class="fade-lines">
  <h1>{{ post.title }}</h1>
  <i>
    <p><strong>Author:</strong> Brady Hawkins | <strong>Published:</strong> {{ post.publishedAt | date }}</p>
    <p>{{ post.description }}</p>
  </i>
  <div class="post" *ngFor="let page of post.pages">
    <div *ngFor="let block of page.blocks">
      <p>{{ block.plaintext }}</p>
    </div>
  </div>
</div>

<ng-template #notFound>
  <p>Post not found.</p>
</ng-template>
